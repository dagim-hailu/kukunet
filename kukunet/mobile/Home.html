<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kukunet Digital - Home</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background-color: #121212;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .bg-dashboard-dark { background-color: #212121; }
    .bg-dashboard-card { background-color: #1A1A1A; }
    .text-muted { color: #8E8E8E; }
    /* Hide scrollbar for clean horizontal scrolling */
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-neutral-950">

  <!-- HOME SCREEN CONTAINER -->
  <div class="w-[360px] h-[740px] bg-dashboard-dark rounded-[40px] border border-neutral-800 p-6 flex flex-col justify-between shadow-2xl overflow-hidden relative">
    <div class="flex flex-col h-[640px] overflow-y-auto scrollbar-none">
      <!-- Header -->
      <div class="flex justify-between items-start mb-5 flex-shrink-0">
        <div>
          <h1 class="text-2xl font-bold tracking-wide">Home</h1>
          <p class="text-xs text-muted mt-1">Pick up where you left off</p>
        </div>
        <button class="p-1 hover:opacity-80 transition">
          <i data-lucide="bell" class="w-6 h-6 text-emerald-500 fill-emerald-500/10"></i>
        </button>
      </div>

      <!-- Search Bar -->
      <div class="flex items-center gap-3 bg-dashboard-card border border-neutral-800 rounded-xl px-4 py-3 mb-5 flex-shrink-0">
        <i data-lucide="search" class="w-4 h-4 text-neutral-500"></i>
        <input type="text" placeholder="Search courses, tracks, topics" class="bg-transparent text-xs w-full outline-none text-neutral-300 placeholder-neutral-500">
      </div>

      <!-- Grid Menu -->
      <div class="grid grid-cols-3 gap-y-5 gap-x-2 mb-6 flex-shrink-0">
        <div class="flex flex-col items-center text-center gap-2 cursor-pointer group">
          <div class="w-11 h-11 rounded-full bg-emerald-950/40 border border-emerald-900/30 flex items-center justify-center group-hover:scale-105 transition">
            <i data-lucide="layout-grid" class="w-4 h-4 text-emerald-400"></i>
          </div>
          <span class="text-[10px] text-neutral-400 font-medium">Category</span>
        </div>
        <div class="flex flex-col items-center text-center gap-2 cursor-pointer group">
          <div class="w-11 h-11 rounded-full bg-cyan-950/40 border border-cyan-900/30 flex items-center justify-center group-hover:scale-105 transition">
            <i data-lucide="radio" class="w-4 h-4 text-cyan-400"></i>
          </div>
          <span class="text-[10px] text-neutral-400 font-medium">Live class</span>
        </div>
        <div class="flex flex-col items-center text-center gap-2 cursor-pointer group">
          <div class="w-11 h-11 rounded-full bg-emerald-950/40 border border-emerald-900/30 flex items-center justify-center group-hover:scale-105 transition">
            <i data-lucide="award" class="w-4 h-4 text-emerald-400"></i>
          </div>
          <span class="text-[10px] text-neutral-400 font-medium">Free course</span>
        </div>
        <div class="flex flex-col items-center text-center gap-2 cursor-pointer group">
          <div class="w-11 h-11 rounded-full bg-rose-950/40 border border-rose-900/30 flex items-center justify-center group-hover:scale-105 transition">
            <i data-lucide="laptop" class="w-4 h-4 text-rose-400"></i>
          </div>
          <span class="text-[10px] text-neutral-400 font-medium">Resources</span>
        </div>
        <div class="flex flex-col items-center text-center gap-2 cursor-pointer group">
          <div class="w-11 h-11 rounded-full bg-cyan-950/40 border border-cyan-900/30 flex items-center justify-center group-hover:scale-105 transition">
            <i data-lucide="video" class="w-4 h-4 text-cyan-400"></i>
          </div>
          <span class="text-[10px] text-neutral-400 font-medium">Recorded</span>
        </div>
        <div class="flex flex-col items-center text-center gap-2 cursor-pointer group">
          <div class="w-11 h-11 rounded-full bg-emerald-950/40 border border-emerald-900/30 flex items-center justify-center group-hover:scale-105 transition">
            <i data-lucide="trophy" class="w-4 h-4 text-emerald-400"></i>
          </div>
          <span class="text-[10px] text-neutral-400 font-medium">Leaderboard</span>
        </div>
      </div>

      <!-- NEW: Registration CTA Banner -->
      <div class="bg-gradient-to-r from-emerald-900/40 to-cyan-950/40 border border-emerald-800/30 rounded-2xl p-4 mb-6 flex items-center justify-between flex-shrink-0 shadow-lg">
        <div class="max-w-[65%]">
          <h3 class="text-xs font-bold text-neutral-200">Ready to level up?</h3>
          <p class="text-[10px] text-neutral-400 mt-0.5 leading-tight">Register for new cohort tracks today.</p>
        </div>
        <button onclick="alert('Redirecting to course registration...')" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white text-[11px] font-bold px-3.5 py-2 rounded-xl shadow-md shadow-emerald-600/20 transition-all flex items-center gap-1">
          <span>Register</span>
          <i data-lucide="arrow-right" class="w-3 h-3"></i>
        </button>
      </div>

      <!-- Recommended For You Section -->
      <div class="flex-shrink-0">
        <div class="flex justify-between items-baseline mb-3">
          <h2 class="text-sm font-semibold tracking-wide">Recommended for you</h2>
          <button class="text-xs text-emerald-500 font-semibold hover:underline">More</button>
        </div>
        
        <!-- Course List with Horizontal Scroll -->
        <div class="flex gap-4 overflow-x-auto pb-2 scrollbar-none">
          <!-- Course 1: HTML, CSS, JS -->
          <div class="flex-shrink-0 w-28 cursor-pointer group">
            <div class="h-20 rounded-2xl bg-emerald-950/30 border border-emerald-900/20 flex items-center justify-center mb-2 group-hover:bg-emerald-950/50 transition">
              <i data-lucide="code-2" class="w-7 h-7 text-emerald-400"></i>
            </div>
            <p class="text-xs font-medium truncate">HTML, CSS, JS</p>
            <div class="flex items-center gap-1 mt-0.5">
              <span class="text-[11px] text-neutral-400 font-bold">8.9</span>
              <i data-lucide="star" class="w-3 h-3 text-amber-400 fill-amber-400"></i>
            </div>
          </div>
          
          <!-- Course 2: Graphics Design -->
          <div class="flex-shrink-0 w-28 cursor-pointer group">
            <div class="h-20 rounded-2xl bg-cyan-950/30 border border-cyan-900/20 flex items-center justify-center mb-2 group-hover:bg-cyan-950/50 transition">
              <i data-lucide="palette" class="w-7 h-7 text-cyan-400"></i>
            </div>
            <p class="text-xs font-medium truncate">Graphics Design</p>
            <div class="flex items-center gap-1 mt-0.5">
              <span class="text-[11px] text-neutral-400 font-bold">8.5</span>
              <i data-lucide="star" class="w-3 h-3 text-amber-400 fill-amber-400"></i>
            </div>
          </div>

          <!-- Course 3: AI Prompt Engineering -->
          <div class="flex-shrink-0 w-28 cursor-pointer group">
            <div class="h-20 rounded-2xl bg-amber-950/20 border border-amber-900/20 flex items-center justify-center mb-2 group-hover:bg-amber-950/30 transition">
              <i data-lucide="terminal" class="w-7 h-7 text-amber-500"></i>
            </div>
            <p class="text-xs font-medium truncate">AI Prompts</p>
            <div class="flex items-center gap-1 mt-0.5">
              <span class="text-[11px] text-neutral-400 font-bold">9.2</span>
              <i data-lucide="star" class="w-3 h-3 text-amber-400 fill-amber-400"></i>
            </div>
          </div>

          <!-- Course 4: Python -->
          <div class="flex-shrink-0 w-28 cursor-pointer group">
            <div class="h-20 rounded-2xl bg-purple-950/20 border border-purple-900/20 flex items-center justify-center mb-2 group-hover:bg-purple-950/30 transition">
              <i data-lucide="binary" class="w-7 h-7 text-purple-400"></i>
            </div>
            <p class="text-xs font-medium truncate">Python</p>
            <div class="flex items-center gap-1 mt-0.5">
              <span class="text-[11px] text-neutral-400 font-bold">8.7</span>
              <i data-lucide="star" class="w-3 h-3 text-amber-400 fill-amber-400"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Navigation Bar -->
    <div class="flex justify-between items-center border-t border-neutral-800/60 pt-4 px-2 bg-dashboard-dark flex-shrink-0">
      <a href="home.html" class="flex flex-col items-center gap-1 text-emerald-500">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a href="track.html" class="flex flex-col items-center gap-1 text-neutral-500 hover:text-neutral-300 transition">
        <i data-lucide="book-open" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">Track</span>
      </a>
      <a href="progress.html" class="flex flex-col items-center gap-1 text-neutral-500 hover:text-neutral-300 transition">
        <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">Progress</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-1 text-neutral-500 hover:text-neutral-300 transition">
        <i data-lucide="user" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">Profile</span>
      </a>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
